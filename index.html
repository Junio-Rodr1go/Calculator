<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Calcualdora</title>
</head>
<body>
    
    <div id="light" class="bi bi-moon-fill NoturnMode"></div>

    <div id="Calculator">
        <div id="result"></div>

        <div id="numbers">
            
            <div id="delete-all">C</div>
            <div>.</div>
            <div>(</div>
            <div>)</div>
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>/</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>*</div>
            <div>7</div>
            <div>8</div>
            <div>9</div>
            <div>-</div>
            <i class="bi bi-backspace" id="backSpace"></i>
            <div>0</div>
            <div>+</div>
            <equal id="equal">=</equal>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
